name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${VERSION}"
          go build -trimpath -ldflags "${LDFLAGS}" \
            -o "dist/dtrack-submit-${GOOS}-${GOARCH}${{ matrix.suffix }}" .
          go build -trimpath -ldflags "${LDFLAGS}" \
            -o "dist/dtrack-mcp-server-${GOOS}-${GOARCH}${{ matrix.suffix }}" ./cmd/mcp-server

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  installer:
    name: Windows NSIS installer
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: dist-windows-amd64
          path: dist

      - name: Install NSIS + EnVar plugin
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis nsis-pluginapi unzip curl
          # EnVar plugin for PATH editing.
          curl -sSL -o /tmp/envar.zip https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip
          PLUGIN_DIR=$(find /usr/share/nsis -type d -name Plugins | head -1)
          sudo unzip -o /tmp/envar.zip -d /tmp/envar
          sudo cp /tmp/envar/Plugins/x86-unicode/EnVar.dll "${PLUGIN_DIR}/x86-unicode/" || \
            sudo cp -r /tmp/envar/Plugins/* "${PLUGIN_DIR}/"

      - name: Stage binaries for installer
        run: |
          cp dist/dtrack-submit-windows-amd64.exe installer/dtrack-submit.exe
          cp dist/dtrack-mcp-server-windows-amd64.exe installer/dtrack-mcp-server.exe

      - name: Build installer
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading 'v' for the version define (1.2.3, not v1.2.3).
          VER="${VERSION#v}"
          makensis -DVERSION="${VER}" installer/dtrack-submit.nsi
          mkdir -p out
          mv installer/dtrack-submit-setup-*.exe out/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: out/*

  release:
    name: Publish Release
    needs: [build, installer]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging

      - name: Assemble release assets
        run: |
          mkdir -p dist
          # Raw binaries (used by self-update) + installer.
          cp staging/dist-*/* dist/ 2>/dev/null || true
          cp staging/installer/* dist/ 2>/dev/null || true
          # Checksums over everything self-update may fetch (binary names must
          # match assetName() in update.go for verification to kick in).
          cd dist
          # Hash only the shipped binaries — avoids hashing checksums.txt itself.
          sha256sum dtrack-* > checksums.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
